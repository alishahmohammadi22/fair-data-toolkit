databases:
  # Free PostgreSQL — NOTE: Render free DBs expire after 90 days
  - name: fair-toolkit-db
    plan: free
    databaseName: fair_toolkit
    user: fair

services:
  # ── FastAPI + SQLAlchemy backend ──────────────────────────────────────────
  - type: web
    name: fair-toolkit-api
    plan: free
    env: docker
    # Build context is repo root so the Dockerfile can copy fair_toolkit/ package
    dockerfilePath: webapp/api/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fair-toolkit-db
          property: connectionString

  # ── Vue 3 SPA (static site) ───────────────────────────────────────────────
  - type: web
    name: fair-toolkit-app
    plan: free
    env: static
    rootDir: webapp/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # After first deploy, set this to:
      #   https://<fair-toolkit-api service URL>.onrender.com/api
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      # Rewrite all paths to index.html for Vue Router (client-side routing)
      - type: rewrite
        source: /*
        destination: /index.html
